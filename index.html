<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker Pro</title>

https://cdn.jsdelivr.net/npm/chart.js

<style>

*{
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
    transition:0.3s;
}

.container{
    max-width:1200px;
    margin:auto;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input,
select{
    width:100%;
    padding:10px;
    margin-top:8px;
    margin-bottom:10px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
    color:white;
}

.add-btn{
    background:#0078D7;
}

.status-btn{
    background:#28a745;
}

.delete-btn{
    background:#d9534f;
}

.theme-btn{
    background:#444;
}

.summary{
    display:flex;
    gap:15px;
}

.summary div{
    flex:1;
    background:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.filter-row{
    display:flex;
    align-items:center;
    gap:10px;
}

.filter-row select{
    max-width:250px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:left;
}

th{
    background:#0078D7;
    color:white;
}

.paid{
    color:green;
    font-weight:bold;
}

.pending{
    color:red;
    font-weight:bold;
}

/* DARK MODE */

.dark-mode{
    background:#121212;
    color:white;
}

.dark-mode .card,
.dark-mode .summary div{
    background:#1e1e1e;
    color:white;
}

.dark-mode input,
.dark-mode select{
    background:#2d2d2d;
    color:white;
    border:1px solid #555;
}

.dark-mode table{
    color:white;
}

.dark-mode td{
    border-color:#444;
}

.dark-mode th{
    background:#005fb8;
}

/* MOBILE */

@media(max-width:768px){

    .header{
        flex-direction:column;
        gap:10px;
    }

    .summary{
        flex-direction:column;
    }

    .filter-row{
        flex-direction:column;
        align-items:stretch;
    }

    table{
        display:block;
        overflow-x:auto;
        white-space:nowrap;
    }

    button{
        margin-top:5px;
    }
}

</style>
</head>

<body>

<div class="container">

<div class="header">
    <h2>💰 Expense Tracker Pro</h2>

    <button class="theme-btn" onclick="toggleDarkMode()">
        🌙 Dark Mode
    </button>
</div>

<div class="summary">

    <div>
        <h3 id="totalExpense">₹0</h3>
        <small>Total Expense</small>
    </div>

    <div>
        <h3 id="paidAmount">₹0</h3>
        <small>Paid</small>
    </div>

    <div>
        <h3 id="pendingAmount">₹0</h3>
        <small>Pending</small>
    </div>

</div>

<div class="card">

    <h3>Add Expense</h3>

    <input type="text" id="name" placeholder="Expense Name">

    <input type="number" id="amount" placeholder="Amount">

    <input type="date" id="duedate">

    <input type="number" id="paid" placeholder="Amount Paid">

    <label>
        <input type="checkbox" id="recurring">
        Monthly Recurring Expense
    </label>

    <br><br>

    <button class="add-btn" onclick="addExpense()">
        Add Expense
    </button>

</div>

<div class="card">

    <h3>📊 Monthly Expense Trend</h3>

    <canvas id="expenseChart"></canvas>

</div>

<div class="card">

    <div class="filter-row">

        <h3>Expenses</h3>

        <select id="monthFilter" onchange="renderTable()">
            <option value="">All Months</option>
        </select>

    </div>

    <table>

        <thead>
            <tr>
                <th>Name</th>
                <th>Amount</th>
                <th>Paid</th>
                <th>Month</th>
                <th>Due Date</th>
                <th>Status</th>
                <th>Recurring</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody id="expenseTable"></tbody>

    </table>

</div>

</div>

<script>

let expenses =
JSON.parse(localStorage.getItem("expenses")) || [];

let expenseChart = null;

/* DARK MODE */

function toggleDarkMode(){

    document.body.classList.toggle("dark-mode");

    localStorage.setItem(
        "darkMode",
        document.body.classList.contains("dark-mode")
    );
}

if(localStorage.getItem("darkMode")==="true"){
    document.body.classList.add("dark-mode");
}

/* STORAGE */

function saveData(){

    localStorage.setItem(
        "expenses",
        JSON.stringify(expenses)
    );
}

/* ADD EXPENSE */

function addExpense(){

    let amount =
    Number(document.getElementById("amount").value);

    let paid =
    Number(document.getElementById("paid").value);

    let dueDate =
    document.getElementById("duedate").value;

    if(!document.getElementById("name").value ||
       !amount){
        alert("Please enter Expense Name and Amount");
        return;
    }

    let month =
    dueDate
    ? dueDate.substring(0,7)
    : new Date().toISOString().substring(0,7);

    let expense = {

        name:
        document.getElementById("name").value,

        amount:amount,

        paid:paid,

        dueDate:dueDate,

        month:month,

        status:
        paid >= amount ? "Paid" : "Pending",

        recurring:
        document.getElementById("recurring").checked
    };

    expenses.push(expense);

    saveData();

    populateMonthFilter();
    renderTable();
    renderChart();

    document.getElementById("name").value="";
    document.getElementById("amount").value="";
    document.getElementById("paid").value="";
    document.getElementById("duedate").value="";
    document.getElementById("recurring").checked=false;
}

/* DELETE */

function deleteExpense(index){

    expenses.splice(index,1);

    saveData();

    renderTable();
    renderChart();
}

/* STATUS TOGGLE */

function toggleStatus(index){

    if(expenses[index].status==="Pending"){

        expenses[index].status="Paid";
        expenses[index].paid=
        expenses[index].amount;

    }else{

        expenses[index].status="Pending";
        expenses[index].paid=0;
    }

    saveData();

    renderTable();
    renderChart();
}

/* MONTHLY RECURRING */

function carryForwardRecurring(){

    const currentMonth =
    new Date().toISOString().substring(0,7);

    const lastMonth =
    localStorage.getItem("lastCarryForward");

    if(lastMonth === currentMonth){
        return;
    }

    let recurringExpenses =
    expenses.filter(e => e.recurring);

    recurringExpenses.forEach(item => {

        let exists =
        expenses.some(exp =>
            exp.name === item.name &&
            exp.month === currentMonth
        );

        if(!exists){

            expenses.push({

                name:item.name,
                amount:item.amount,
                paid:0,
                dueDate:"",
                month:currentMonth,
                status:"Pending",
                recurring:true
            });
        }
    });

    localStorage.setItem(
        "lastCarryForward",
        currentMonth
    );

    saveData();
}

/* FILTER */

function populateMonthFilter(){

    const filter =
    document.getElementById("monthFilter");

    let selected =
    filter.value;

    let months =
    [...new Set(expenses.map(e=>e.month))]
    .sort()
    .reverse();

    filter.innerHTML =
    '<option value="">All Months</option>';

    months.forEach(month => {

        filter.innerHTML +=
        `<option value="${month}">
            ${month}
        </option>`;
    });

    filter.value = selected;
}

/* TABLE */

function renderTable(){

    const table =
    document.getElementById("expenseTable");

    const selectedMonth =
    document.getElementById("monthFilter").value;

    table.innerHTML="";

    let total=0;
    let paidTotal=0;

    expenses.forEach((e,index)=>{

        if(selectedMonth &&
           e.month !== selectedMonth){
            return;
        }

        total += e.amount;
        paidTotal += e.paid;

        table.innerHTML += `

        <tr>

            <td>${e.name}</td>

            <td>₹${e.amount}</td>

            <td>₹${e.paid}</td>

            <td>${e.month}</td>

            <td>${e.dueDate || "-"}</td>

            <td class="${e.status==="Paid" ? "paid" : "pending"}">
                ${e.status}
            </td>

            <td>
                ${e.recurring ? "✅" : "❌"}
            </td>

            <td>

                <button
                class="status-btn"
                onclick="toggleStatus(${index})">
                ${e.status==="Pending"
                ? "Mark Paid"
                : "Mark Pending"}
                </button>

                <button
                class="delete-btn"
                onclick="deleteExpense(${index})">
                Delete
                </button>

            </td>

        </tr>
        `;
    });

    document.getElementById("totalExpense")
    .innerText = "₹" + total;

    document.getElementById("paidAmount")
    .innerText = "₹" + paidTotal;

    document.getElementById("pendingAmount")
    .innerText = "₹" + (total-paidTotal);
}

/* CHART */

function renderChart(){

    let monthlyData = {};

    expenses.forEach(exp => {

        if(!monthlyData[exp.month]){
            monthlyData[exp.month]=0;
        }

        monthlyData[exp.month]+=exp.amount;
    });

    let labels =
    Object.keys(monthlyData).sort();

    let values =
    labels.map(label =>
        monthlyData[label]);

    let ctx =
    document.getElementById("expenseChart");

    if(expenseChart){
        expenseChart.destroy();
    }

    expenseChart = new Chart(ctx, {

        type:"bar",

        data:{
            labels:labels,

            datasets:[{
                label:"Monthly Expenses",
                data:values,
                backgroundColor:"#0078D7"
            }]
        },

        options:{
            responsive:true,
            maintainAspectRatio:true
        }
    });
}

/* INIT */

carryForwardRecurring();
populateMonthFilter();
renderTable();
renderChart();

</script>

</body>
</html>
