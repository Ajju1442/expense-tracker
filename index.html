<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Manager Pro</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:20px;
}

.container{
    max-width:1100px;
    margin:auto;
}

h1{
    text-align:center;
    color:#0078d7;
}

.card{
    background:#fff;
    padding:20px;
    margin-bottom:15px;
    border-radius:12px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.summary{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
}

.summary .box{
    flex:1;
    min-width:180px;
    background:#0078d7;
    color:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:8px;
    margin-bottom:10px;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
}

button{
    border:none;
    background:#0078d7;
    color:white;
    padding:10px 15px;
    border-radius:6px;
    cursor:pointer;
    margin-right:5px;
    margin-top:5px;
}

button:hover{
    background:#005fa3;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:8px;
    text-align:left;
}

th{
    background:#0078d7;
    color:white;
}

.paid{
    color:green;
    font-weight:bold;
}

.pending{
    color:red;
    font-weight:bold;
}

.filters{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

@media(max-width:768px){
    table{
        font-size:12px;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>💰 Expense Manager Pro</h1>

<div class="summary">

<div class="box">
<h2 id="totalExpense">₹0</h2>
<p>Total Expense</p>
</div>

<div class="box">
<h2 id="paidAmount">₹0</h2>
<p>Total Paid</p>
</div>

<div class="box">
<h2 id="pendingAmount">₹0</h2>
<p>Pending</p>
</div>

</div>

<div class="card">

<h2>Add Expense Template</h2>

<input type="text" id="name" placeholder="Expense Name (WiFi, Rent, SIP etc)">

<input type="number" id="amount" placeholder="Amount">

<input type="date" id="duedate">

<select id="status">
<option>Pending</option>
<option>Paid</option>
</select>

<input type="number" id="paid" placeholder="Amount Paid">

<label>
<input type="checkbox" id="recurring" checked>
Monthly Recurring Expense
</label>

<br><br>

<button onclick="addExpense()">Save Expense</button>

<button onclick="createNextMonth()">
Generate Next Month
</button>

</div>

<div class="card">

<h2>Filter</h2>

<div class="filters">

<select id="monthFilter" onchange="renderTable()">

<option value="all">All Months</option>

<option value="1">January</option>
<option value="2">February</option>
<option value="3">March</option>
<option value="4">April</option>
<option value="5">May</option>
<option value="6">June</option>
<option value="7">July</option>
<option value="8">August</option>
<option value="9">September</option>
<option value="10">October</option>
<option value="11">November</option>
<option value="12">December</option>

</select>

</div>

</div>

<div class="card">

<h2>Expenses</h2>

<table>

<thead>

<tr>
<th>Name</th>
<th>Amount</th>
<th>Paid</th>
<th>Due Date</th>
<th>Month</th>
<th>Status</th>
<th>Recurring</th>
<th>Action</th>
</tr>

</thead>

<tbody id="expenseTable"></tbody>

</table>

</div>

</div>

<script>

let expenses =
JSON.parse(localStorage.getItem('expenses')) || [];

function saveData(){
localStorage.setItem(
'expenses',
JSON.stringify(expenses)
);
}

function addExpense(){

let expense={

name:document.getElementById('name').value,

amount:Number(
document.getElementById('amount').value
),

paid:Number(
document.getElementById('paid').value || 0
),

dueDate:
document.getElementById('duedate').value,

status:
document.getElementById('status').value,

month:new Date().getMonth()+1,

year:new Date().getFullYear(),

recurring:
document.getElementById('recurring').checked

};

expenses.push(expense);

saveData();

renderTable();

document.getElementById('name').value='';
document.getElementById('amount').value='';
document.getElementById('paid').value='';
}

function deleteExpense(index){

if(confirm("Delete this expense?")){

expenses.splice(index,1);

saveData();
renderTable();

}
}

function toggleStatus(index){

if(expenses[index].status==="Pending"){

expenses[index].status="Paid";
