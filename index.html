<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
}
.container{
    max-width:800px;
    margin:auto;
}
.card{
    background:white;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
input,select{
    width:100%;
    padding:10px;
    margin-top:8px;
    margin-bottom:10px;
    border:1px solid #ccc;
    border-radius:5px;
}
button{
    padding:10px 15px;
    border:none;
    background:#0078D7;
    color:white;
    border-radius:5px;
    cursor:pointer;
}
table{
    width:100%;
    border-collapse:collapse;
}
th,td{
    border:1px solid #ddd;
    padding:8px;
    text-align:left;
}
th{
    background:#0078D7;
    color:white;
}
.paid{
    color:green;
    font-weight:bold;
}
.pending{
    color:red;
    font-weight:bold;
}
.summary{
    display:flex;
    justify-content:space-around;
    text-align:center;
}
.summary div{
    background:#fff;
    padding:15px;
    border-radius:10px;
    width:30%;
}
</style>
</head>

<body>

<div class="container">

<h2>💰 Expense Tracker</h2>

<div class="card summary">
    <div>
        <h3 id="totalExpense">₹0</h3>
        <small>Total</small>
    </div>
    <div>
        <h3 id="paidAmount">₹0</h3>
        <small>Paid</small>
    </div>
    <div>
        <h3 id="pendingAmount">₹0</h3>
        <small>Pending</small>
    </div>
</div>

<div class="card">
    <h3>Add Expense</h3>

    <input type="text" id="name" placeholder="Expense Name">

    <input type="number" id="amount" placeholder="Amount">

    <input type="date" id="duedate">

    <select id="status">
        <option>Paid</option>
        <option>Pending</option>
    </select>

    <input type="number" id="paid" placeholder="Amount Paid">

    <button onclick="addExpense()">Add Expense</button>
</div>

<div class="card">
    <h3>Expenses</h3>

    <table>
        <thead>
        <tr>
            <th>Name</th>
            <th>Amount</th>
            <th>Paid</th>
            <th>Due Date</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody id="expenseTable"></tbody>
    </table>
</div>

</div>

<script>

let expenses =
JSON.parse(localStorage.getItem('expenses')) || [];

function saveData(){
    localStorage.setItem(
        'expenses',
        JSON.stringify(expenses)
    );
}

function addExpense(){

    let expense={
        name:document.getElementById('name').value,
        amount:Number(document.getElementById('amount').value),
        paid:Number(document.getElementById('paid').value),
        dueDate:document.getElementById('duedate').value,
        status:document.getElementById('status').value
    };

    expenses.push(expense);
    saveData();
    renderTable();

    document.getElementById('name').value='';
    document.getElementById('amount').value='';
    document.getElementById('paid').value='';
}

function deleteExpense(index){
    expenses.splice(index,1);
    saveData();
    renderTable();
}

function renderTable(){

    let table=document.getElementById('expenseTable');
    table.innerHTML='';

    let total=0;
    let paidTotal=0;

    expenses.forEach((e,index)=>{

        total += e.amount;
        paidTotal += e.paid;

        table.innerHTML += `
        <tr>
            <td>${e.name}</td>
            <td>₹${e.amount}</td>
            <td>₹${e.paid}</td>
            <td>${e.dueDate}</td>
            <td class="${e.status==='Paid'?'paid':'pending'}">
                 ${e.status}
            </td>
            <td>
                <button onclick="deleteExpense(${index})">
                    Delete
                </button>
            </td>
        </tr>
        `;
    });

    document.getElementById('totalExpense').innerText='₹'+total;
    document.getElementById('paidAmount').innerText='₹'+paidTotal;
    document.getElementById('pendingAmount').innerText='₹'+(total-paidTotal);
}

renderTable();

</script>

</body>
</html>
