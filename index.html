<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Expense Manager Pro</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#0078D7;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:5px;
box-sizing:border-box;
}

button{
background:#0078D7;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
margin-right:5px;
}

button:hover{
background:#005fa3;
}

.summary{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.summary div{
flex:1;
background:#0078D7;
color:white;
padding:15px;
border-radius:10px;
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:8px;
}

th{
background:#0078D7;
color:white;
}

.paid{
color:green;
font-weight:bold;
}

.pending{
color:red;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>💰 Expense Manager Pro</h1>

<div class="summary">

<div>
<h2 id="totalExpense">₹0</h2>
<p>Total</p>
</div>

<div>
<h2 id="paidExpense">₹0</h2>
<p>Paid</p>
</div>

<div>
<h2 id="pendingExpense">₹0</h2>
<p>Pending</p>
</div>

</div>

<div class="card">

<h3>Add Expense</h3>

<input id="name" placeholder="Expense Name">

<input id="amount" type="number" placeholder="Amount">

<input id="duedate" type="date">

<select id="status">
<option value="Pending">Pending</option>
<option value="Paid">Paid</option>
</select>

<input id="paid" type="number" placeholder="Amount Paid">

<label>
<input type="checkbox" id="recurring">
 Monthly Recurring Expense
</label>

<br><br>

<button onclick="addExpense()">
Save Expense
</button>

<button onclick="generateNextMonth()">
Generate Next Month
</button>

</div>

<div class="card">

<h3>Expenses</h3>

<table>

<thead>
<tr>
<th>Name</th>
<th>Amount</th>
<th>Paid</th>
<th>Status</th>
<th>Month</th>
<th>Action</th>
</tr>
</thead>

<tbody id="expenseTable">
</tbody>

</table>

</div>

</div>

<script>

let expenses =
JSON.parse(localStorage.getItem("expenses")) || [];

function saveExpenses(){

localStorage.setItem(
"expenses",
JSON.stringify(expenses)
);

}

function addExpense(){

let name =
document.getElementById("name").value.trim();

let amount =
parseFloat(
document.getElementById("amount").value
);

if(!name){
alert("Enter expense name");
return;
}

if(isNaN(amount)){
alert("Enter amount");
return;
}

let expense = {

name:name,

amount:amount,

paid:parseFloat(
document.getElementById("paid").value
) || 0,

status:
document.getElementById("status").value,

month:
new Date().getMonth()+1,

year:
new Date().getFullYear(),

recurring:
document.getElementById("recurring").checked

};

expenses.push(expense);

saveExpenses();

renderExpenses();

document.getElementById("name").value="";
document.getElementById("amount").value="";
document.getElementById("paid").value="";

}

function toggleStatus(index){

if(expenses[index].status==="Pending"){

expenses[index].status="Paid";
expenses[index].paid=
expenses[index].amount;

}else{

expenses[index].status="Pending";
expenses[index].paid=0;

}

saveExpenses();
renderExpenses();

}

function deleteExpense(index){

expenses.splice(index,1);

saveExpenses();
renderExpenses();

}

function generateNextMonth(){

let currentMonth =
new Date().getMonth()+1;

let nextMonth =
currentMonth+1;

let year =
new Date().getFullYear();

if(nextMonth>12){
nextMonth=1;
year++;
}

expenses.forEach(exp=>{

if(exp.recurring){

let exists =
expenses.some(x=>

x.name===exp.name &&
x.month===nextMonth &&
x.year===year

);

if(!exists){

expenses.push({

name:exp.name,
amount:exp.amount,
paid:0,
status:"Pending",
month:nextMonth,
year:year,
recurring:true

});

}

}

});

saveExpenses();
renderExpenses();

alert("Next Month Generated");

}

function renderExpenses(){

let tbody =
document.getElementById("expenseTable");

tbody.innerHTML="";

let total=0;
let paid=0;

expenses.forEach((exp,index)=>{

total += Number(exp.amount);
paid += Number(exp.paid);

tbody.innerHTML += `

<tr>

<td>${exp.name}</td>

<td>₹${exp.amount}</td>

<td>₹${exp.paid}</td>

<td class="${
exp.status==="Paid"
? "paid"
: "pending"
}">
${exp.status}
</td>

<td>
${exp.month}/${exp.year}
</td>

<td>

<button
onclick="toggleStatus(${index})">

Toggle

</button>

<button
onclick="deleteExpense(${index})">

Delete

</button>

</td>

</tr>

`;

});

document.getElementById(
"totalExpense"
).innerText="₹"+total;

document.getElementById(
"paidExpense"
).innerText="₹"+paid;

document.getElementById(
"pendingExpense"
).innerText=
"₹"+(total-paid);

}

renderExpenses();

</script>

</body>
</html>
