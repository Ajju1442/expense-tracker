<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker Pro</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    margin:0;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.card{
    background:#fff;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

input,select{
    width:100%;
    padding:10px;
    margin-top:8px;
    margin-bottom:10px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    padding:8px 12px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    color:white;
    margin-right:5px;
}

.add-btn{
    background:#0078D7;
}

.delete-btn{
    background:#d9534f;
}

.status-btn{
    background:#28a745;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:left;
}

th{
    background:#0078D7;
    color:white;
}

.paid{
    color:green;
    font-weight:bold;
}

.pending{
    color:red;
    font-weight:bold;
}

.summary{
    display:flex;
    justify-content:space-between;
    gap:10px;
}

.summary div{
    flex:1;
    background:white;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

.filter-row{
    display:flex;
    gap:10px;
    align-items:center;
}

.filter-row select{
    width:250px;
}

</style>
</head>

<body>

<div class="container">

<h2>💰 Expense Tracker Pro</h2>

<div class="card summary">
    <div>
        <h3 id="totalExpense">₹0</h3>
        <small>Total</small>
    </div>

    <div>
        <h3 id="paidAmount">₹0</h3>
        <small>Paid</small>
    </div>

    <div>
        <h3 id="pendingAmount">₹0</h3>
        <small>Pending</small>
    </div>
</div>

<div class="card">

    <h3>Add Expense</h3>

    <input type="text" id="name" placeholder="Expense Name">

    <input type="number" id="amount" placeholder="Amount">

    <input type="date" id="duedate">

    <select id="status">
        <option>Pending</option>
        <option>Paid</option>
    </select>

    <input type="number" id="paid" placeholder="Amount Paid">

    <label>
        <input type="checkbox" id="recurring">
        Monthly Recurring Expense
    </label>

    <br><br>

    <button class="add-btn" onclick="addExpense()">
        Add Expense
    </button>

</div>

<div class="card">

    <div class="filter-row">
        <h3>Expenses</h3>

        <select id="monthFilter" onchange="renderTable()">
            <option value="">All Months</option>
        </select>
    </div>

    <table>

        <thead>
            <tr>
                <th>Name</th>
                <th>Amount</th>
                <th>Paid</th>
                <th>Month</th>
                <th>Due Date</th>
                <th>Status</th>
                <th>Recurring</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="expenseTable"></tbody>

    </table>

</div>

</div>

<script>

let expenses =
JSON.parse(localStorage.getItem("expenses")) || [];

carryForwardRecurring();

function saveData(){
    localStorage.setItem(
        "expenses",
        JSON.stringify(expenses)
    );
}

function addExpense(){

    let amount =
    Number(document.getElementById("amount").value);

    let paid =
    Number(document.getElementById("paid").value);

    let dueDate =
    document.getElementById("duedate").value;

    let month =
    dueDate ?
    dueDate.substring(0,7) :
    new Date().toISOString().substring(0,7);

    let expense = {

        name:
        document.getElementById("name").value,

        amount:amount,

        paid:paid,

        dueDate:dueDate,

        month:month,

        status:
        paid >= amount ? "Paid" : "Pending",

        recurring:
        document.getElementById("recurring").checked
    };

    expenses.push(expense);

    saveData();

    populateMonthFilter();

    renderTable();

    document.getElementById("name").value="";
    document.getElementById("amount").value="";
    document.getElementById("paid").value="";
}

function deleteExpense(index){

    expenses.splice(index,1);

    saveData();

    renderTable();
}

function toggleStatus(index){

    if(expenses[index].status==="Pending"){

        expenses[index].status="Paid";
        expenses[index].paid=
        expenses[index].amount;

    }else{

        expenses[index].status="Pending";
        expenses[index].paid=0;
    }

    saveData();

    renderTable();
}

function carryForwardRecurring(){

    const now = new Date();

    const currentMonth =
    now.toISOString().substring(0,7);

    const lastMonth =
    localStorage.getItem("lastCarryForward");

    if(lastMonth === currentMonth){
        return;
    }

    let recurringItems =
    expenses.filter(e => e.recurring);

    recurringItems.forEach(item => {

        let exists =
        expenses.some(exp =>
            exp.name === item.name &&
            exp.month === currentMonth
        );

        if(!exists){

            expenses.push({

                name:item.name,
                amount:item.amount,
                paid:0,
                dueDate:"",
                month:currentMonth,
                status:"Pending",
                recurring:true
            });
        }
    });

    localStorage.setItem(
        "lastCarryForward",
        currentMonth
    );

    saveData();
}

function populateMonthFilter(){

    let months =
    [...new Set(expenses.map(e => e.month))]
    .sort()
    .reverse();

    let filter =
    document.getElementById("monthFilter");

    let currentValue = filter.value;

    filter.innerHTML=
    '<option value="">All Months</option>';

    months.forEach(month=>{

        filter.innerHTML +=
        `<option value="${month}">
            ${month}
        </option>`;
    });

    filter.value=currentValue;
}

function renderTable(){

    let table =
    document.getElementById("expenseTable");

    table.innerHTML="";

    let filterMonth =
    document.getElementById("monthFilter").value;

    let total=0;
    let paidTotal=0;

    expenses.forEach((e,index)=>{

        if(filterMonth &&
           e.month !== filterMonth){
            return;
        }

        total += e.amount;
        paidTotal += e.paid;

        table.innerHTML += `
        <tr>

            <td>${e.name}</td>

            <td>₹${e.amount}</td>

            <td>₹${e.paid}</td>

            <td>${e.month}</td>

            <td>${e.dueDate || "-"}</td>

            <td class="${
                e.status==="Paid"
                ?"paid"
                :"pending"
            }">

                ${e.status}

            </td>

            <td>
                ${e.recurring ? "✅" : "❌"}
            </td>

            <td>

                <button
                class="status-btn"
                onclick="toggleStatus(${index})">

                ${
                    e.status==="Pending"
                    ?"Mark Paid"
                    :"Mark Pending"
                }

                </button>

                <button
                class="delete-btn"
                onclick="deleteExpense(${index})">

                Delete

                </button>

            </td>

        </tr>
        `;
    });

    document.getElementById(
        "totalExpense"
    ).innerText=
    "₹"+total;

    document.getElementById(
        "paidAmount"
    ).innerText=
    "₹"+paidTotal;

    document.getElementById(
        "pendingAmount"
    ).innerText=
    "₹"+(total-paidTotal);
}

populateMonthFilter();
renderTable();

</script>

</body>
</html>
